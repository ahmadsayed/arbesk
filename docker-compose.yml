services:
  ipfs:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: arbesk-private-ipfs
    # Private-only node: no peers, no public DHT. Only API and Gateway are
    # exposed, bound to loopback so they're reachable only from this laptop.
    # Swarm ports are intentionally not published — the daemon binds swarm to
    # the container's loopback and has no bootstrap peers.
    ports:
      - "127.0.0.1:5001:5001" # IPFS API
      - "127.0.0.1:8080:8080" # IPFS Gateway
    volumes:
      - ipfs-data:/data/ipfs
    # Isolation is enforced inside the daemon, not at the Docker network layer:
    # no bootstrap peers, Routing.Type=none, swarm bound to container loopback.
    # (An `internal: true` network would block the host port mappings above.)
    restart: unless-stopped

  hardhat:
    build:
      context: .
      dockerfile: docker/hardhat.Dockerfile
    container_name: arbesk-hardhat
    ports:
      - "127.0.0.1:8545:8545" # Hardhat local EVM network
    volumes:
      # Mount project files individually so the host's empty node_modules
      # directory does not shadow the image's installed dependencies.
      - ./blockchain/hardhat.config.js:/app/hardhat.config.js
      - ./blockchain/contracts:/app/contracts
      - ./blockchain/scripts:/app/scripts
      - ./blockchain/test:/app/test
      - ./blockchain/deployments:/app/deployments
      - ./blockchain/.env:/app/.env
      - ./blockchain/artifacts:/app/artifacts
      # Named volume keeps Hardhat compiler cache across restarts
      - hardhat-cache:/app/cache
    # Default command starts the local node; override for compile/test/deploy:
    # docker compose run --rm hardhat npx hardhat compile
    # docker compose run --rm hardhat npx hardhat test
    # docker compose run --rm hardhat npx hardhat run scripts/deploy.js --network hardhat
    #
    # For testnet/mainnet deploy, pass env vars inline:
    # docker compose run --rm -e PRIVATE_KEY=0x... hardhat npx hardhat run scripts/deploy.js --network filecoinCalibration
    restart: unless-stopped

volumes:
  ipfs-data:
  hardhat-cache:
