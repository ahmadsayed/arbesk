<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload → Decomposition → IPFS Dedup (ECharts)</title>
  <style>
    :root {
      --choco-1: #faf6f2;
      --choco-2: #f0e6d8;
      --choco-3: #e0d0bc;
      --choco-4: #cdb89a;
      --choco-5: #b89a7a;
      --choco-6: #a28060;
      --choco-7: #8c6a4a;
      --choco-8: #7a5c3e;
      --choco-9: #664a30;
      --choco-10: #523a22;
      --choco-11: #3d2a18;
      --choco-12: #2a1a0e;
      --gold: #a07848;

      --window-bg: var(--choco-12);
      --window-fg: var(--choco-2);
      --card-bg: var(--choco-10);
      --card-fg: var(--choco-3);
      --border-color: var(--choco-9);
      --accent-bg: var(--gold);
      --dim-fg: var(--choco-6);

      --branch-tex: #f59e0b;
      --branch-mesh: #38bdf8;
      --branch-anim: #a78bfa;
      --status-new: #10b981;
      --status-dupe: #ec4899;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --window-bg: var(--choco-1);
        --window-fg: var(--choco-12);
        --card-bg: var(--choco-1);
        --card-fg: var(--choco-11);
        --border-color: #b89a7a;
        --accent-bg: var(--gold);
        --dim-fg: var(--choco-7);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: var(--window-bg);
      color: var(--window-fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .slide {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0 0 0.4rem;
      font-size: clamp(1.25rem, 2.5vw, 1.75rem);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    p.subtitle {
      margin: 0;
      font-size: 0.9rem;
      color: var(--dim-fg);
    }

    #chart {
      width: 100%;
      max-width: 1150px;
      height: 320px;
      border-radius: 14px;
    }

    .legend {
      display: flex;
      gap: 1.25rem;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--dim-fg);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .dot { width: 9px; height: 9px; border-radius: 50%; }
    .dot.tex { background: var(--branch-tex); }
    .dot.mesh { background: var(--branch-mesh); }
    .dot.anim { background: var(--branch-anim); }
    .dot.new { background: var(--status-new); }
    .dot.dupe { background: var(--status-dupe); }
  </style>
</head>
<body>
  <div class="slide">
    <header>
      <h1>Upload → Decomposition → IPFS Dedup</h1>
      <p class="subtitle">One asset splits into textures, mesh, and animation; each branch is hashed and uploaded independently.</p>
    </header>

    <div id="chart"></div>

    <div class="legend">
      <span><span class="dot tex"></span> Textures</span>
      <span><span class="dot mesh"></span> Mesh</span>
      <span><span class="dot anim"></span> Animation</span>
      <span><span class="dot new"></span> Stored</span>
      <span><span class="dot dupe"></span> Reused CID</span>
    </div>
  </div>

  <script src="https://unpkg.com/echarts@5.4.3/dist/echarts.min.js"></script>
  <script>
    const colors = {
      tex: '#f59e0b',
      mesh: '#38bdf8',
      anim: '#a78bfa',
      main: '#a07848',
      dim: '#8b9bb4',
      card: '#523a22',
      border: '#664a30',
      text: '#f0e6d8'
    };

    const nodes = [
      { id: 'upload', name: '📁 Upload', x: 60, y: 160, step: 0 },
      { id: 'decompose', name: '🧩 Decompose', x: 220, y: 160, step: 1 },

      { id: 'tex', name: '🖼️ Textures', x: 420, y: 60, branch: 'tex', step: 2 },
      { id: 'mesh', name: '🔷 Mesh', x: 420, y: 160, branch: 'mesh', step: 2 },
      { id: 'anim', name: '🏃 Animation', x: 420, y: 260, branch: 'anim', step: 2 },

      { id: 'hash-tex', name: '#️⃣ Hash', x: 600, y: 60, branch: 'tex', step: 3 },
      { id: 'hash-mesh', name: '#️⃣ Hash', x: 600, y: 160, branch: 'mesh', step: 3 },
      { id: 'hash-anim', name: '#️⃣ Hash', x: 600, y: 260, branch: 'anim', step: 3 },

      { id: 'ipfs-tex', name: '🌐 IPFS', x: 780, y: 60, branch: 'tex', step: 4 },
      { id: 'ipfs-mesh', name: '🌐 IPFS', x: 780, y: 160, branch: 'mesh', step: 4 },
      { id: 'ipfs-anim', name: '🌐 IPFS', x: 780, y: 260, branch: 'anim', step: 4 },

      { id: 'dedup', name: '♻️ Dedup', x: 980, y: 160, step: 5 }
    ];

    const graphEdges = [
      { source: 'upload', target: 'decompose' },

      { source: 'decompose', target: 'tex', branch: 'tex', curveness: -0.35 },
      { source: 'decompose', target: 'mesh', branch: 'mesh' },
      { source: 'decompose', target: 'anim', branch: 'anim', curveness: 0.35 },

      { source: 'tex', target: 'hash-tex', branch: 'tex' },
      { source: 'mesh', target: 'hash-mesh', branch: 'mesh' },
      { source: 'anim', target: 'hash-anim', branch: 'anim' },

      { source: 'hash-tex', target: 'ipfs-tex', branch: 'tex' },
      { source: 'hash-mesh', target: 'ipfs-mesh', branch: 'mesh' },
      { source: 'hash-anim', target: 'ipfs-anim', branch: 'anim' },

      { source: 'ipfs-tex', target: 'dedup', branch: 'tex', curveness: 0.35 },
      { source: 'ipfs-mesh', target: 'dedup', branch: 'mesh' },
      { source: 'ipfs-anim', target: 'dedup', branch: 'anim', curveness: -0.35 }
    ];

    function makeLineEdges(branch, curvenessMap) {
      return graphEdges
        .filter(e => e.branch === branch)
        .map(e => ({
          coords: [
            [nodes.find(n => n.id === e.source).x, nodes.find(n => n.id === e.source).y],
            [nodes.find(n => n.id === e.target).x, nodes.find(n => n.id === e.target).y]
          ],
          lineStyle: { curveness: e.curveness || 0 }
        }));
    }

    function baseLineSeries(branch, color) {
      return {
        type: 'lines',
        coordinateSystem: 'cartesian2d',
        zlevel: 2,
        effect: {
          show: true,
          period: 2.2,
          trailLength: 0,
          symbol: 'circle',
          symbolSize: 8,
          color: color
        },
        lineStyle: {
          color: color,
          width: 0,
          opacity: 0
        },
        data: makeLineEdges(branch)
      };
    }

    const chart = echarts.init(document.getElementById('chart'));

    const option = {
      backgroundColor: 'transparent',
      xAxis: { min: 0, max: 1100, show: false },
      yAxis: { min: 0, max: 320, inverse: true, show: false },
      tooltip: { show: false },
      series: [
        {
          type: 'graph',
          coordinateSystem: 'cartesian2d',
          zlevel: 1,
          data: nodes.map(n => ({
            id: n.id,
            name: n.name,
            x: n.x,
            y: n.y,
            symbol: 'roundRect',
            symbolSize: [110, 42],
            itemStyle: {
              color: colors.card,
              borderColor: n.branch ? colors[n.branch] : colors.border,
              borderWidth: n.branch ? 1.5 : 1
            },
            label: {
              show: true,
              color: colors.text,
              fontSize: 13,
              fontWeight: 600
            }
          })),
          edges: graphEdges.map(e => ({
            source: e.source,
            target: e.target,
            lineStyle: {
              color: e.branch ? colors[e.branch] : colors.border,
              curveness: e.curveness || 0,
              width: 2
            }
          })),
          edgeSymbol: ['none', 'arrow'],
          edgeSymbolSize: [0, 10],
          layout: 'none',
          roam: false,
          animationDuration: 0
        },
        baseLineSeries('tex', colors.tex),
        baseLineSeries('mesh', colors.mesh),
        baseLineSeries('anim', colors.anim)
      ]
    };

    chart.setOption(option);

    // Active-stage highlight
    const stepGroups = [
      ['upload'],
      ['decompose'],
      ['tex', 'mesh', 'anim'],
      ['hash-tex', 'hash-mesh', 'hash-anim'],
      ['ipfs-tex', 'ipfs-mesh', 'ipfs-anim'],
      ['dedup']
    ];

    function highlightStep() {
      const now = Date.now();
      const activeIds = stepGroups[Math.floor(now / 1400) % stepGroups.length];

      chart.setOption({
        series: [{
          data: nodes.map(n => ({
            id: n.id,
            itemStyle: {
              shadowBlur: activeIds.includes(n.id) ? 12 : 0,
              shadowColor: activeIds.includes(n.id) ? colors.main : 'transparent',
              borderWidth: activeIds.includes(n.id) ? 2.5 : (n.branch ? 1.5 : 1),
              borderColor: activeIds.includes(n.id) ? colors.main : (n.branch ? colors[n.branch] : colors.border)
            }
          }))
        }]
      });
    }

    setInterval(highlightStep, 1400);
    highlightStep();

    window.addEventListener('resize', () => chart.resize());
  </script>
</body>
</html>
